name: Code Coverage

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  coverage:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y gcovr lcov
        pip install --user gcovr
        
    - name: Configure with coverage flags
      run: |
        mkdir -p build && cd build
        cmake -DENABLE_COVERAGE=ON -DCMAKE_BUILD_TYPE=Debug ..
        
    - name: Build
      run: |
        cd build
        make -j2
        
    - name: Run tests
      run: |
        cd build
        ./tests/run_tests
        
    - name: Debug - list gcda files
      run: |
        cd build
        find . -name "*.gcda" -type f
        find . -name "*.gcno" -type f
        
    - name: Generate coverage report
      run: |
        cd build
        gcovr --root .. \
              --filter '.*/banking/.*\.cpp$' \
              --exclude '.*/tests/.*' \
              --exclude '.*/build/.*' \
              --exclude '.*/_deps/.*' \
              --exclude '.*/googletest/.*' \
              --exclude '.*/CMakeFiles/.*' \
              --exclude '.*/mock_account.h' \
              --print-summary \
              --html --html-details coverage.html \
              --coveralls coverage.json
        
    - name: Show coverage.json content
      run: |
        cd build
        cat coverage.json | head -50 || echo "coverage.json is empty or not found"
        
    - name: Send to Coveralls
      uses: coverallsapp/github-action@v2
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        file: build/coverage.json
        format: coveralls
      continue-on-error: true
