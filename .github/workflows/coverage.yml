name: Code Coverage

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  coverage:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y gcovr lcov
        pip install --user gcovr
        
    - name: Configure with coverage flags
      run: |
        mkdir -p build && cd build
        cmake -DENABLE_COVERAGE=ON -DCMAKE_BUILD_TYPE=Debug ..
        
    - name: Build
      run: |
        cd build
        make -j2
        
    - name: Run tests
      run: |
        cd build
        ./tests/run_tests
        
    - name: Find all gcda files
      run: |
        cd build
        echo "=== All .gcda files ==="
        find . -name "*.gcda" -type f
        echo "=== Banking .gcda files ==="
        find . -path "*/banking/*.gcda" -type f || echo "No banking gcda files found!"
        echo "=== Banking directory in build ==="
        ls -la banking/ || echo "No banking directory in build!"
        echo "=== CMakeFiles directory ==="
        find . -name "*.gcda" -path "*/CMakeFiles/banking.dir/*" -type f
        
    - name: Run gcovr on banking directory directly
      run: |
        cd build
        gcovr --root ../banking --print-summary
        
    - name: Generate coverage with correct root
      run: |
        cd build
        gcovr --root . \
              --filter '.*/banking/.*\.cpp$' \
              --print-summary \
              --coveralls coverage.json
        
    - name: Send to Coveralls
      uses: coverallsapp/github-action@v2
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        file: build/coverage.json
        format: coveralls
      continue-on-error: true
